# Tiny Tapeout project information
project:
  title: "Firmware Signature Verification Accelerator"
  author: "Your Name"
  discord: "your_discord_username"
  description: "Hardware accelerator for firmware signature verification using simple hash and signature comparison logic."
  language: "Verilog"
  clock_hz: 10000000

  # Tiny Tapeout tile size
  tiles: "1x1"

  # Top module name
  top_module: "tt_um_firmware_signature_verify"

  # Source files
  source_files:
    - "tt_um_firmware_signature_verify.v"

# Pinout configuration
pinout:
  # Dedicated inputs
  ui[0]: "Firmware Data Bit 0"
  ui[1]: "Firmware Data Bit 1"
  ui[2]: "Firmware Data Bit 2"
  ui[3]: "Firmware Data Bit 3"
  ui[4]: "Firmware Data Bit 4"
  ui[5]: "Firmware Data Bit 5"
  ui[6]: "Firmware Data Bit 6"
  ui[7]: "Firmware Data Bit 7"

  # Dedicated outputs
  uo[0]: "Verification Status"
  uo[1]: "Hash Output Bit 0"
  uo[2]: "Hash Output Bit 1"
  uo[3]: "Hash Output Bit 2"
  uo[4]: "Hash Output Bit 3"
  uo[5]: "Hash Output Bit 4"
  uo[6]: "Hash Output Bit 5"
  uo[7]: "Hash Output Bit 6"

  # Bidirectional IOs used as signature input
  uio[0]: "Signature Data Bit 0"
  uio[1]: "Signature Data Bit 1"
  uio[2]: "Signature Data Bit 2"
  uio[3]: "Signature Data Bit 3"
  uio[4]: "Signature Data Bit 4"
  uio[5]: "Signature Data Bit 5"
  uio[6]: "Signature Data Bit 6"
  uio[7]: "Signature Data Bit 7"

# Do not change
yaml_version: 6
